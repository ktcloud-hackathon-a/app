# ьЭ┤ CronJobьЭА preview namespaceьЭШ ызМыгМ ьЛЬъ░ДьЭД ы│┤ъ│а ьг╝ъ╕░ьаБьЬ╝ыбЬ ьаХыжмэХйыЛИыЛд.
# ыПЩьЮС ы░йьЛЭ:
# 1. label `preview-environment=true` ъ░А ы╢ЩьЭА namespace ьб░эЪМ
# 2. annotation `preview.example.com/expires-at` ъ░А эШДьЮм UTC ьЛЬъ░Бы│┤ыЛд ъ│╝ъ▒░ый┤ ызМыгМыбЬ эМРыЛи
# 3. preview namespace ьВньаЬ
apiVersion: v1
kind: Namespace
metadata:
  name: preview-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-cleaner
  namespace: preview-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preview-cleaner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-cleaner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: preview-cleaner
subjects:
  - kind: ServiceAccount
    name: preview-cleaner
    namespace: preview-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-expired-preview
  namespace: preview-system
spec:
  # 5ы╢ДызИыЛд ызМыгМыРЬ preview эЩШъ▓╜ эЩХьЭ╕
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: preview-cleaner
          restartPolicy: OnFailure
          containers:
            - name: preview-cleaner
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache kubectl >/dev/null

                  NOW="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                  echo "UTC now: $NOW"

                  kubectl get namespaces \
                    -l preview-environment=true \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
                  while read -r ns; do
                    [ -z "$ns" ] && continue

                    expires="$(kubectl get namespace "$ns" -o jsonpath='{.metadata.annotations.preview\.example\.com/expires-at}')"

                    if [ -z "$expires" ]; then
                      echo "skip $ns: expires-at annotation ьЧЖьЭМ"
                      continue
                    fi

                    oldest="$(printf '%s\n%s\n' "$expires" "$NOW" | sort | head -n1)"
                    if [ "$oldest" != "$expires" ] || [ "$expires" = "$NOW" ]; then
                      echo "keep $ns: not expired yet ($expires)"
                      continue
                    fi

                    echo "expired namespace detected: $ns (expires-at=$expires)"

                    kubectl delete namespace "$ns" --wait=false
                  done
